<!DOCTYPE html>

.proof-loader {

  display: grid;

  html = html.replace(
    /<title>.*?<\/title>/,

  html = html.replace(
    /data-text="BASIC x KAWAII"[^>]*>BASIC x KAWAII<\/h1>\s*<h1 class="tm-title tm-glitch-text" data-text="LIVE SWITCH"[^>]*>LIVE SWITCH<\/h1>/,

  );
  html = html.replace(
    /data-text="BASIC x KAWAII"[^>]*>BASIC x KAWAII<\/h1>\s*<h1 class="tm-title tm-glitch-text" data-text="LIVE"[^>]*>LIVE<\/h1>\s*<h1 class="tm-title tm-glitch-text" data-text="SWITCH"[^>]*>SWITCH<\/h1>/,

  );
  html = html.replace(
    'BASIC <span style="color: var(--color-primary); text-shadow: 0 0 15px var(--color-primary);">x</span> <span style="color: var(--color-secondary); text-shadow: 0 0 15px var(--color-secondary);">KAWAII LIVE SWITCH</span>',

  );
  html = html.replace(
    'Open Source 2026 BASIC x KAWAII LIVE SWITCH',
    'Open Source 2026 TAMAVERSE KAWAII CYBER-POP'
  );

  document.open();
  document.write(html);
  document.close();
})();
