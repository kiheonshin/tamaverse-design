    <script data-id="tamaverse-ext-error-filter">
      /* Suppress benign crypto-wallet extension errors (evmAsk/MetaMask/Kaikas)
         that try to redefine window.ethereum. These are browser-extension bugs,
         not produced by this site, but flood the console/error overlay. */
      (function(){
        function isExt(e){
          if(!e) return false;
          var fn = e.filename || "";
          if(fn.indexOf("chrome-extension://")===0 || fn.indexOf("moz-extension://")===0) return true;
          var msg = (e.error && e.error.message) || e.message || "";
          if(typeof msg === "string" && (msg.indexOf("Cannot redefine property: ethereum")!==-1 || msg.indexOf("evmAsk")!==-1)) return true;
          if(e.error && e.error.stack && typeof e.error.stack === "string" && e.error.stack.indexOf("chrome-extension://")!==-1) return true;
          return false;
        }
        window.addEventListener("error", function(e){
          if(isExt(e)){ e.stopImmediatePropagation(); e.stopPropagation(); e.preventDefault(); return true; }
        }, true);
        window.addEventListener("unhandledrejection", function(e){
          var r = e && e.reason, m = r && (r.message || String(r));
          if(typeof m === "string" && (m.indexOf("ethereum")!==-1 || m.indexOf("evmAsk")!==-1)){
            e.stopImmediatePropagation(); e.preventDefault();
          }
        }, true);
        var prev = window.onerror;
        window.onerror = function(msg, url){
          if((typeof url==="string" && url.indexOf("chrome-extension://")===0) ||
             (typeof msg==="string" && msg.indexOf("Cannot redefine property: ethereum")!==-1)){
            return true;
          }
          return prev ? prev.apply(this, arguments) : false;
        };
      })();
    </script>
